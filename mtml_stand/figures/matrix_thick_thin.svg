<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">Скелетное разложение матрицы</title>
  <desc id="desc">Слева произведение компактных матриц A и B, справа матрица C.</desc>

  <defs>
    <linearGradient id="matrixU" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8eb7f4"/>
      <stop offset="1" stop-color="#5f92da"/>
    </linearGradient>
    <linearGradient id="matrixV" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffd4a2"/>
      <stop offset="1" stop-color="#f0a95e"/>
    </linearGradient>
    <linearGradient id="matrixA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7aa6e8"/>
      <stop offset="1" stop-color="#ea9a4c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M 22 0 L 0 0 0 22" fill="none" stroke="#ffffff" stroke-opacity="0.26" stroke-width="1"/>
    </pattern>
  </defs>

  <g filter="url(#shadow)">
    <rect x="70" y="62" width="132" height="236" rx="14" fill="url(#matrixU)"/>
    <rect x="70" y="62" width="132" height="236" rx="14" fill="url(#grid)"/>
  </g>
  <text x="136" y="335" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#2e5f9d">A</text>

  <text x="250" y="188" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="700" fill="#cf7a36">×</text>

  <g filter="url(#shadow)">
    <rect x="298" y="108" width="170" height="142" rx="14" fill="url(#matrixV)"/>
    <rect x="298" y="108" width="170" height="142" rx="14" fill="url(#grid)"/>
  </g>
  <text x="383" y="335" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#b06025">B</text>

  <text x="536" y="188" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="700" fill="#557fbf">≈</text>

  <g filter="url(#shadow)">
    <rect x="606" y="62" width="226" height="236" rx="16" fill="url(#matrixA)"/>
    <rect x="606" y="62" width="226" height="236" rx="16" fill="url(#grid)"/>
  </g>
  <text x="719" y="335" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#4e5f75">C</text>
</svg>
